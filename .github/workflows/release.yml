name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          cd dist
          zip -r ../gpt-unloader-${{ steps.get_version.outputs.VERSION }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: GPT Unloader ${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            ## Installation

            1. Download `gpt-unloader-${{ steps.get_version.outputs.VERSION }}.zip`
            2. Extract the zip
            3. Go to `chrome://extensions`, enable **Developer mode**
            4. Click **Load unpacked** and select the extracted folder
          files: gpt-unloader-${{ steps.get_version.outputs.VERSION }}.zip
          draft: false
          prerelease: false
